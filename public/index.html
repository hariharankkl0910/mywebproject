<!DOCTYPE html>
<html lang="en">
<head>
    <title>Smart Task Prioritizer</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; }
        input { margin: 5px 0; padding: 8px; width: 95%; }
        button { padding: 10px; background: #28a745; color: white; border: none; width: 100%; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between;}
        .score { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
<div class="container">
    <h2>Smart Task Prioritizer</h2>
    <input type="text" id="taskName" placeholder="Task Name" />
    <input type="number" id="impact" placeholder="Impact (1-10)" />
    <input type="number" id="effort" placeholder="Effort (1-10)" />
    <button onclick="addTask()">Add Task</button>

    <h3>Priority Queue (Highest ROI first):</h3>
    <ul id="taskList"></ul>
</div>

<script>
    async function addTask() {
        const name = document.getElementById('taskName').value;
        const impact = document.getElementById('impact').value;
        const effort = document.getElementById('effort').value;

        const response = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, impact, effort })
        });

        const tasks = await response.json();
        const list = document.getElementById('taskList');
        list.innerHTML = '';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${task.name}</span> <span class="score">Score: ${task.priority}</span>`;
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
